<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>October Pharma</title>
    <link rel="stylesheet" href="123.css">
</head>
<body>
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-prism">
                <div class="prism-face"></div>
                <div class="prism-face"></div>
                <div class="prism-face"></div>
            </div>
            <div class="loader-text">October Pharma...</div>
        </div>
    </div>

    <header class="top-header">
        <div class="top-header-inner">
            <a class="header-brand" href="#intro" aria-label="Home">
                <img class="header-logo" src="images/logo.png" alt="Logo">
            </a>
            <img class="header-slogan-svg" src="images/Dia-IQ.svg" alt="Diabetes Care" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <p class="header-slogan" style="display:none;">Diabetes Care</p>
        </div>
    </header>

    <section class="intro" id="intro">
        <div class="intro-boxes" aria-label="Highlight boxes">
            <div class="intro-box" role="button" tabindex="0" aria-label="Open guidelines section">
                <img class="intro-box-main" src="images/logo-Left.png" alt="Primary visual 1" onerror="this.src='images/logo.png'">
                <img class="intro-box-hover" src="images/Left-Box.png" alt="Hover visual 1" onerror="this.src='images/logo.png'">
            </div>
            <div class="intro-box" role="button" tabindex="0" aria-label="Open guidelines section">
                <img class="intro-box-main" src="images/logo-Right.png" alt="Primary visual 2" onerror="this.src='images/logo.png'">
                <img class="intro-box-hover" src="images/Right-Box.png" alt="Hover visual 2" onerror="this.src='images/logo.png'">
            </div>
        </div>
        <a class="library-link" href="https://octoberpharma-my.sharepoint.com/:f:/p/dia-iq/Ep5OKJNfic9Cn2yDCwds4YYBhPt_lPEWI_9Ti2DsIBfe6g?e=A3dDTW" target="_blank" rel="noopener noreferrer">
            Visit our Medical Library
        </a>
        <button class="intro-btn" type="button" onclick="scrollToSection('home')">Open Guidelines</button>
    </section>

    <section class="hero" id="home">
        <div class="carousel-container">
            <div class="carousel" id="carousel"></div>

            <div class="carousel-controls">
                <button class="carousel-btn" id="prevBtn" aria-label="Previous slide">&#8249;</button>
                <button class="carousel-btn" id="nextBtn" aria-label="Next slide">&#8250;</button>
            </div>

            <div class="carousel-indicators" id="indicators"></div>
        </div>
    </section>

    <script src="456.js"></script>
</body>
</html>
